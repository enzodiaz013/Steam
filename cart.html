<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steam - Carrito</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header>
  <a class="logo" href="store.html">
    <svg viewBox="0 0 148 148" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="74" cy="74" r="74" fill="#1b2838"/>
      <path d="M74 18C43.1 18 18 43.1 18 74c0 24.8 15.7 46 37.9 54l13.9-57.4c-1.2-2.3-1.9-4.9-1.9-7.6 0-9.4 7.6-17 17-17s17 7.6 17 17-7.6 17-17 17c-.5 0-1 0-1.5-.1L27.9 93.4C33.4 113.6 52.2 128 74 128c30.9 0 56-25.1 56-56S104.9 18 74 18z" fill="#c6d4df"/>
      <circle cx="85" cy="63" r="10" fill="#1b2838"/>
    </svg>
    STEAM
  </a>
  <nav>
    <a href="store.html">TIENDA</a>
    <a href="community.html">COMUNIDAD</a>
    <a href="dashboard.html">BIBLIOTECA</a>
  </nav>
  <div class="header-right">
    <a href="cart.html" class="cart-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
      <span id="cart-badge" class="cart-badge" style="display:none">0</span>
    </a>
    <div id="header-user-zone"></div>
  </div>
</header>

<!-- CART PAGE -->
<div class="cart-wrapper">
  <div id="cart-content"></div>
</div>

<footer>
  <p>&copy; 2026 Valve Corporation. Todos los derechos reservados.</p>
</footer>

<script src="games.js"></script>
<script>
  initHeader();

  function renderCart() {
    const items = Cart.get();
    const content = document.getElementById('cart-content');

    if (items.length === 0) {
      content.innerHTML = `
        <div class="cart-empty">
          <div class="cart-empty-icon">🛒</div>
          <h2>Tu carrito está vacío</h2>
          <p>Explorá la tienda y agregá juegos que te interesen.</p>
          <a href="store.html" class="btn-blue" style="display:inline-block;width:auto;padding:12px 32px;text-decoration:none;margin-top:8px">
            IR A LA TIENDA
          </a>
        </div>`;
      return;
    }

    const games = items.map(item => GAMES.find(g => g.id === item.id)).filter(Boolean);
    const total = Cart.total();

    content.innerHTML = `
      <div class="cart-layout">

        <!-- Items list -->
        <div class="cart-items">
          <h2 class="cart-title">Tu carrito — <span>${games.length} artículo${games.length !== 1 ? 's' : ''}</span></h2>

          ${games.map(g => `
            <div class="cart-item" id="ci-${g.id}">
              <a href="game.html?id=${g.id}">
                <img src="${g.image}" alt="${g.title}" class="cart-item-img">
              </a>
              <div class="cart-item-info">
                <a href="game.html?id=${g.id}" class="cart-item-title">${g.title}</a>
                <div class="cart-item-tags">
                  ${g.tags.slice(0,3).map(t => `<span class="tag">${t}</span>`).join('')}
                </div>
                <div class="cart-item-meta">
                  ${g.os.map(o => `<span class="os-badge">${o}</span>`).join('')}
                </div>
              </div>
              <div class="cart-item-right">
                <div class="cart-item-price">${priceHTML(g)}</div>
                <button class="cart-remove-btn" onclick="removeItem(${g.id})">✕ Quitar</button>
              </div>
            </div>`).join('')}

          <a href="store.html" class="continue-link">← Seguir comprando</a>
        </div>

        <!-- Summary -->
        <div class="cart-summary">
          <h3 class="summary-title">Resumen del pedido</h3>

          <div class="summary-lines">
            ${games.map(g => `
              <div class="summary-line">
                <span>${g.title}</span>
                <span>${g.free ? 'Gratis' : '$' + g.price.toFixed(2)}</span>
              </div>`).join('')}
          </div>

          <div class="summary-divider"></div>

          <div class="summary-total">
            <span>TOTAL ESTIMADO</span>
            <span>$${total.toFixed(2)}</span>
          </div>

          <p class="summary-note">Los impuestos se calcularán al momento del pago.</p>

          <button class="checkout-btn" onclick="checkout()">FINALIZAR COMPRA →</button>

          <div class="payment-icons">
            <span title="Visa">💳</span>
            <span title="Mastercard">💳</span>
            <span title="PayPal">🅿️</span>
            <span title="Steam Wallet">💰</span>
          </div>
        </div>
      </div>

    `;
  }

  function removeItem(id) {
    const el = document.getElementById(`ci-${id}`);
    if (el) {
      el.style.opacity = '0';
      el.style.transform = 'translateX(20px)';
      el.style.transition = 'all 0.3s';
      setTimeout(() => { Cart.remove(id); renderCart(); }, 300);
    }
  }

  function checkout() {
    if (!Session.isLoggedIn()) { window.location.href = 'index.html'; return; }
    window.location.href = 'checkout.html';
  }

  renderCart();
</script>

</body>
</html>
