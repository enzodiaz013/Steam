<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steam — Biblioteca</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <a class="logo" href="store.html">
    <svg viewBox="0 0 148 148" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="74" cy="74" r="74" fill="#1b2838"/><path d="M74 18C43.1 18 18 43.1 18 74c0 24.8 15.7 46 37.9 54l13.9-57.4c-1.2-2.3-1.9-4.9-1.9-7.6 0-9.4 7.6-17 17-17s17 7.6 17 17-7.6 17-17 17c-.5 0-1 0-1.5-.1L27.9 93.4C33.4 113.6 52.2 128 74 128c30.9 0 56-25.1 56-56S104.9 18 74 18z" fill="#c6d4df"/><circle cx="85" cy="63" r="10" fill="#1b2838"/></svg>
    STEAM
  </a>
  <nav>
    <a href="store.html">TIENDA</a>
    <a href="community.html">COMUNIDAD</a>
    <a href="dashboard.html" class="active">BIBLIOTECA</a>
  </nav>
  <div class="header-right">
    <a href="cart.html" class="cart-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span id="cart-badge" class="cart-badge" style="display:none">0</span>
    </a>
    <div id="header-user-zone"></div>
  </div>
</header>

<div class="page-wrap" style="margin-top:24px" id="library-content"></div>

<footer><p>&copy; 2026 Valve Corporation. Todos los derechos reservados.</p></footer>

<script src="games.js"></script>
<script>
  if (!Session.isLoggedIn()) window.location.href = 'index.html';
  initHeader();

  function getLibraryGames() {
    const purchasedIds = JSON.parse(localStorage.getItem('steam_library') || '[]').map(i => i.id);
    return purchasedIds.map(id => GAMES.find(g => g.id === id)).filter(Boolean);
  }

  function render() {
    const games = getLibraryGames();
    document.getElementById('library-content').innerHTML = `
      <div style="max-width:1100px;margin:0 auto;padding:0 16px">
        <h1 style="font-size:22px;font-weight:700;margin-bottom:20px">Tu biblioteca</h1>
        ${games.length === 0 ? `
          <div style="background:var(--panel2);border:1px solid var(--border);border-radius:6px;padding:48px;text-align:center">
            <div style="font-size:48px;margin-bottom:16px">🎮</div>
            <h3 style="margin-bottom:8px">No tenés juegos aún</h3>
            <p style="color:var(--text-dim);font-size:13px;margin-bottom:20px">Explorá la tienda y encontrá tu próximo juego favorito.</p>
            <a href="store.html" class="btn-blue" style="display:inline-block;padding:11px 28px;font-size:13px">IR A LA TIENDA</a>
          </div>` : `
        <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(185px,1fr));gap:12px">
          ${games.map(g => {
            const installed = isInstalled(g.id);
            return `
              <div class="lib-game-card">
                <img src="${g.image}" alt="${g.title}" onclick="window.location='game.html?id=${g.id}'" onerror="this.style.background='#1e3a52'" style="cursor:pointer">
                <div class="lib-game-info">
                  <div class="lib-game-title" onclick="window.location='game.html?id=${g.id}'" style="cursor:pointer">${g.title}</div>
                  ${installed
                    ? `<button class="lib-play-btn-inline" onclick="launchGame('${g.title.replace(/'/g,"\\'")}','${g.image}')">▶ Jugar ahora</button>`
                    : `<button class="lib-install-btn" onclick="installGame(${g.id},'${g.title.replace(/'/g,"\\'")}','${g.image}')">⬇ Instalar</button>`}
                </div>
              </div>`;
          }).join('')}
        </div>`}
      </div>
    `;
  }

  function installGame(id, title, img) {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)';
    overlay.innerHTML = `
      <div style="text-align:center;max-width:460px;padding:20px">
        <img src="${img}" alt="${title}" style="width:280px;border-radius:8px;margin-bottom:24px;box-shadow:0 8px 40px rgba(0,0,0,.6)" onerror="this.style.display='none'">
        <div style="font-size:22px;font-weight:700;margin-bottom:8px">${title}</div>
        <div style="background:var(--border);border-radius:4px;height:6px;margin:16px 0;overflow:hidden">
          <div id="inst-bar" style="height:100%;width:0%;background:var(--blue);transition:width .5s ease"></div>
        </div>
        <div id="inst-status" style="font-size:12px;color:var(--teal);font-weight:600">Preparando instalación...</div>
        <button id="inst-btn" onclick="this.closest('div[style]').remove()" style="margin-top:28px;background:none;border:1px solid var(--border);color:var(--text-dim);padding:9px 24px;border-radius:3px;cursor:pointer;font-size:13px">Cancelar</button>
      </div>`;
    document.body.appendChild(overlay);

    const steps = [[15,'Verificando archivos...'],[40,'Descargando contenido...'],[70,'Instalando archivos...'],[90,'Aplicando actualizaciones...'],[100,'¡Instalación completa!']];
    let i = 0;
    const iv = setInterval(() => {
      if (i >= steps.length) { clearInterval(iv); return; }
      const [pct, msg] = steps[i++];
      document.getElementById('inst-bar').style.width = pct + '%';
      document.getElementById('inst-status').textContent = msg;
      if (pct === 100) {
        clearInterval(iv);
        const list = JSON.parse(localStorage.getItem('steam_installed') || '[]');
        if (!list.find(x => x.id === id)) { list.push({id}); localStorage.setItem('steam_installed', JSON.stringify(list)); }
        document.getElementById('inst-status').style.color = 'var(--green-light)';
        const btn = document.getElementById('inst-btn');
        btn.textContent = 'Cerrar';
        btn.onclick = () => { overlay.remove(); render(); };
      }
    }, 900);

    overlay.addEventListener('click', e => { if (e.target === overlay) { clearInterval(iv); overlay.remove(); } });
  }

  function launchGame(title, img) {
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:9999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)';
    overlay.innerHTML = `
      <div style="text-align:center;max-width:460px;padding:20px">
        <img src="${img}" alt="${title}" style="width:280px;border-radius:8px;margin-bottom:24px;box-shadow:0 8px 40px rgba(0,0,0,.6)" onerror="this.style.display='none'">
        <div style="font-size:22px;font-weight:700;margin-bottom:8px">${title}</div>
        <div style="font-size:13px;color:var(--text-dim);margin-bottom:28px">Steam está preparando el juego...</div>
        <div class="launch-spinner"></div>
        <div id="launch-status" style="font-size:12px;color:var(--teal);margin-top:20px;font-weight:600">Iniciando Steam...</div>
        <button onclick="this.closest('div[style]').remove()" style="margin-top:28px;background:none;border:1px solid var(--border);color:var(--text-dim);padding:9px 24px;border-radius:3px;cursor:pointer;font-size:13px">Cancelar</button>
      </div>`;
    document.body.appendChild(overlay);

    const steps = ['Iniciando Steam...','Verificando archivos...','Aplicando actualizaciones...','¡Lanzando juego!'];
    let i = 0;
    const iv = setInterval(() => {
      i++;
      if (i < steps.length) {
        document.getElementById('launch-status').textContent = steps[i];
      } else {
        clearInterval(iv);
        document.getElementById('launch-status').textContent = '✓ ¡Juego en proceso!';
        document.getElementById('launch-status').style.color = 'var(--green-light)';
        overlay.querySelector('button').textContent = 'Cerrar';
      }
    }, 1200);

    overlay.addEventListener('click', e => { if (e.target === overlay) { clearInterval(iv); overlay.remove(); } });
  }

  render();
</script>

<style>
  .lib-game-card {
    background: var(--panel2); border: 1px solid var(--border);
    border-radius: 4px; overflow: hidden;
    transition: border-color .15s, transform .15s;
  }
  .lib-game-card:hover { border-color: var(--blue-light); transform: translateY(-2px); }
  .lib-game-card img { width: 100%; height: 94px; object-fit: cover; display: block; }
  .lib-game-info { padding: 10px 12px; }
  .lib-game-title { font-size: 13px; font-weight: 600; margin-bottom: 8px; }

  .lib-play-btn-inline {
    display: block; width: 100%; padding: 7px 0;
    background: var(--blue); border: none; border-radius: 3px;
    color: #fff; font-size: 12px; font-weight: 700;
    cursor: pointer; text-align: center; letter-spacing: .4px;
    transition: background .15s;
  }
  .lib-play-btn-inline:hover { background: var(--blue-light); }

  .lib-install-btn {
    display: block; width: 100%; padding: 7px 0;
    background: var(--green); border: none; border-radius: 3px;
    color: #fff; font-size: 12px; font-weight: 700;
    cursor: pointer; text-align: center; letter-spacing: .4px;
    transition: background .15s;
  }
  .lib-install-btn:hover { background: var(--green-light); }

  .launch-spinner {
    width: 40px; height: 40px; border: 3px solid var(--border);
    border-top-color: var(--blue); border-radius: 50%;
    animation: spin .8s linear infinite; margin: 0 auto;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</body>
</html>
