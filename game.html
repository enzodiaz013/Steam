<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steam - Detalle</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- HEADER -->
<header>
  <a class="logo" href="store.html">
    <svg viewBox="0 0 148 148" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="74" cy="74" r="74" fill="#1b2838"/>
      <path d="M74 18C43.1 18 18 43.1 18 74c0 24.8 15.7 46 37.9 54l13.9-57.4c-1.2-2.3-1.9-4.9-1.9-7.6 0-9.4 7.6-17 17-17s17 7.6 17 17-7.6 17-17 17c-.5 0-1 0-1.5-.1L27.9 93.4C33.4 113.6 52.2 128 74 128c30.9 0 56-25.1 56-56S104.9 18 74 18z" fill="#c6d4df"/>
      <circle cx="85" cy="63" r="10" fill="#1b2838"/>
    </svg>
    STEAM
  </a>
  <nav>
    <a href="store.html" class="active">TIENDA</a>
    <a href="community.html">COMUNIDAD</a>
    <a href="dashboard.html">BIBLIOTECA</a>
    <a href="about.html">ACERCA DE</a>
    <a href="support.html">SOPORTE</a>
  </nav>
  <div class="header-right">
    <a href="wallet.html" class="wallet-link" id="wallet-balance">💰 $0.00</a>
    <a href="wishlist.html" class="wishlist-link">♡ <span id="wishlist-count" class="wishlist-count" style="display:none">0</span></a>
    <a href="cart.html" class="cart-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
        <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
      </svg>
      <span id="cart-badge" class="cart-badge" style="display:none">0</span>
    </a>
    <div id="header-user-zone"></div>
  </div>
</header>

<!-- BREADCRUMB -->
<div class="breadcrumb">
  <a href="store.html">Tienda</a>
  <span>›</span>
  <span id="bc-title">Cargando...</span>
</div>

<!-- GAME DETAIL -->
<div id="game-detail" class="game-detail-wrapper"></div>

<footer>
  <p>&copy; 2024 Valve Corporation. Todos los derechos reservados.</p>
</footer>

<script src="games.js"></script>
<script>
  initHeader();

  const params = new URLSearchParams(location.search);
  const id = parseInt(params.get('id'));
  const game = GAMES.find(g => g.id === id);

  if (!game) {
    document.getElementById('game-detail').innerHTML =
      '<p style="text-align:center;padding:60px;color:#8f98a0">Juego no encontrado. <a href="store.html">Volver a la tienda</a></p>';
  } else {
    document.title = `Steam - ${game.title}`;
    document.getElementById('bc-title').textContent = game.title;

    function renderBuyBox() {
      const inLib  = isOwned(game.id);
      const inCart = Cart.has(game.id);
      const inWish = Wishlist.has(game.id);
      const wishBtn = `<button class="wishlist-toggle-btn ${inWish ? 'wished' : ''}" onclick="toggleWish()">
        ${inWish ? '♥ En wishlist' : '♡ Agregar a wishlist'}
      </button>`;

      if (inLib) {
        return `
          <div style="background:rgba(87,203,222,.08);border:1px solid var(--teal);border-radius:6px;padding:12px 14px;margin-bottom:10px;display:flex;align-items:center;gap:10px">
            <span style="color:var(--teal);font-size:18px">✓</span>
            <span style="font-size:13px;font-weight:600;color:var(--teal)">Ya tenés este juego en tu biblioteca</span>
          </div>
          <button class="buy-btn buy-free" onclick="window.location='dashboard.html'">🎮 Ir a la biblioteca</button>
          <button class="buy-btn buy-add" style="background:linear-gradient(135deg,#7b4e9e,#5a3280);margin-top:8px" onclick="openGiftFlow()">🎁 Regalar a un amigo</button>
          ${wishBtn}`;
      }
      if (game.free) {
        return `<button class="buy-btn buy-free">Jugar ahora — Gratis</button>${wishBtn}`;
      }
      if (inCart) {
        return `
          <div class="buy-price">${priceHTML(game)}</div>
          <button class="buy-btn buy-incart" onclick="window.location='cart.html'">Ver en el carrito ✓</button>
          ${wishBtn}`;
      }
      return `
        <div class="buy-price">${priceHTML(game)}</div>
        <button class="buy-btn buy-add" onclick="openBuyChoice()">Agregar al carrito</button>
        ${wishBtn}`;
    }

    function toggleWish() {
      Wishlist.toggle(game.id);
      document.querySelector('.buy-section').innerHTML = renderBuyBox();
      toast(Wishlist.has(game.id) ? '♥ Agregado a wishlist' : '♡ Quitado de wishlist', 'success');
    }

    function openBuyChoice() {
      showBuyChoiceModal(game, function(type, friend, msg) {
        if (type === 'me') {
          Cart.add(game.id);
          window.location.href = 'cart.html';
        } else {
          sessionStorage.setItem('steam_gift', JSON.stringify({ friend, msg, gameTitle: game.title }));
          Cart.add(game.id);
          window.location.href = 'checkout.html';
        }
      });
    }

    function openGiftFlow() {
      showBuyChoiceModal(game, function(type, friend, msg) {
        if (type === 'friend') {
          sessionStorage.setItem('steam_gift', JSON.stringify({ friend, msg, gameTitle: game.title }));
          Cart.add(game.id);
          window.location.href = 'checkout.html';
        }
      });
      // skip step 1, jump straight to gift form
      setTimeout(() => { window._bcForFriend && window._bcForFriend(); }, 30);
    }

    const stars = Math.round(game.rating / 20);
    const starsHTML = '★'.repeat(stars) + '☆'.repeat(5 - stars);

    // ── Screenshots: show 3 copies of header with slight variation ──
    const screens = [game.image, game.image, game.image];

    document.getElementById('game-detail').innerHTML = `
      <!-- HERO -->
      <div class="game-hero" style="background-image:url('${game.image}')">
        <div class="game-hero-overlay">
          <div class="game-hero-content">
            <h1 class="game-hero-title">${game.title}</h1>
            <div class="game-meta-row">
              <span class="game-rating-stars" title="${game.rating}% positivo">${starsHTML}</span>
              <span class="game-rating-num">${game.rating}%</span>
              <span class="meta-sep">|</span>
              <span>${game.releaseDate}</span>
              <span class="meta-sep">|</span>
              <span>${game.developer}</span>
            </div>
          </div>
        </div>
      </div>

      <!-- BODY -->
      <div class="game-body">

        <!-- LEFT: screenshots + description -->
        <div class="game-left">

          <!-- Screenshots -->
          <div class="screenshots-section">
            <h3 class="section-label">CAPTURAS DE PANTALLA</h3>
            <div class="screenshots-main">
              <img id="scr-main" src="${game.image}" alt="Screenshot" class="scr-main-img">
            </div>
            <div class="screenshots-thumbs">
              ${screens.map((s, i) => `
                <img src="${s}" class="scr-thumb ${i === 0 ? 'active' : ''}"
                     onclick="selectScreen(this,'${s}')" alt="Screenshot ${i+1}">`
              ).join('')}
            </div>
          </div>

          <!-- Description -->
          <div class="game-description">
            <h3 class="section-label">ACERCA DE ESTE JUEGO</h3>
            <p>${game.fullDesc}</p>
          </div>

          <!-- Tags -->
          <div class="game-tags-section">
            <h3 class="section-label">ETIQUETAS POPULARES</h3>
            <div class="tags-row">
              ${game.tags.map(t => `<span class="tag-lg">${t}</span>`).join('')}
              ${game.genres.map(ge => `<span class="tag-lg genre-tag">${ge}</span>`).join('')}
            </div>
          </div>
        </div>

        <!-- RIGHT: info + buy box -->
        <div class="game-right">

          <div class="game-card-mini">
            <img src="${game.image}" class="mini-img" alt="${game.title}">
            <p class="mini-shortdesc">${game.shortDesc}</p>
            <div class="mini-meta">
              <div><span class="meta-label">Desarrollador</span><span>${game.developer}</span></div>
              <div><span class="meta-label">Editor</span><span>${game.publisher}</span></div>
              <div><span class="meta-label">Lanzamiento</span><span>${game.releaseDate}</span></div>
              <div><span class="meta-label">Géneros</span><span>${game.genres.join(', ')}</span></div>
              <div><span class="meta-label">Sistemas</span><span>${game.os.join(', ')}</span></div>
            </div>
          </div>

          <div class="buy-section">${renderBuyBox()}</div>

          <!-- Rating bar -->
          <div class="rating-section">
            <div class="rating-label">Valoración de usuarios</div>
            <div class="rating-bar-wrap">
              <div class="rating-bar" style="width:${game.rating}%"></div>
            </div>
            <div class="rating-pct">${game.rating}% positivo</div>
          </div>

          <!-- Related games -->
          <div class="related-section">
            <h4 class="section-label" style="font-size:11px">SIMILARES</h4>
            ${GAMES.filter(g => g.id !== game.id && g.genres.some(ge => game.genres.includes(ge)))
              .slice(0, 3)
              .map(g => `
                <a href="game.html?id=${g.id}" class="related-card">
                  <img src="${g.image}" alt="${g.title}" class="related-img">
                  <div class="related-info">
                    <div class="related-title">${g.title}</div>
                    <div class="related-price">${g.free ? 'Gratis' : '$' + g.price.toFixed(2)}</div>
                  </div>
                </a>`
              ).join('')}
          </div>
        </div>
      </div>
    `;
  }

  function selectScreen(el, src) {
    document.getElementById('scr-main').src = src;
    document.querySelectorAll('.scr-thumb').forEach(t => t.classList.remove('active'));
    el.classList.add('active');
  }
</script>

</body>
</html>
