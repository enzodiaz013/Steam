<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Steam - Iniciar sesión</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <a class="logo" href="index.html">
        <svg viewBox="0 0 148 148" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="74" cy="74" r="74" fill="#1b2838"/>
            <path d="M74 18C43.1 18 18 43.1 18 74c0 24.8 15.7 46 37.9 54l13.9-57.4c-1.2-2.3-1.9-4.9-1.9-7.6 0-9.4 7.6-17 17-17s17 7.6 17 17-7.6 17-17 17c-.5 0-1 0-1.5-.1L27.9 93.4C33.4 113.6 52.2 128 74 128c30.9 0 56-25.1 56-56S104.9 18 74 18z" fill="#c6d4df"/>
            <circle cx="85" cy="63" r="10" fill="#1b2838"/>
        </svg>
        STEAM
    </a>
    <nav>
        <a href="store.html">TIENDA</a>
        <a href="dashboard.html">BIBLIOTECA</a>
    </nav>
    <div class="header-right">
        <a href="cart.html" class="cart-icon" title="Carrito">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/>
                <path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/>
            </svg>
            <span id="cart-badge" class="cart-badge" style="display:none">0</span>
        </a>
    </div>
</header>

<main>
    <div class="box">
        <h2>Iniciar sesión</h2>

        <div id="alert-error"   class="alert alert-error"></div>
        <div id="alert-success" class="alert alert-success"></div>
        <div id="alert-info"    class="alert alert-info"></div>

        <form id="login-form" novalidate>
            <div class="form-group">
                <label for="email">Dirección de email</label>
                <input type="email" id="email" placeholder="nombre@ejemplo.com" autocomplete="email">
                <span class="field-error" id="email-error">Ingresá un email válido.</span>
            </div>
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" placeholder="Tu contraseña" autocomplete="current-password">
                <span class="field-error" id="pass-error">Ingresá tu contraseña.</span>
            </div>
            <button type="submit" class="btn-blue">INICIAR SESIÓN</button>
        </form>

        <div class="divider"><span>¿No tenés cuenta?</span></div>
        <a href="register.html" class="btn-green">CREAR UNA CUENTA GRATUITA</a>
    </div>
</main>

<footer>
    <p>&copy; 2026 Valve Corporation. Todos los derechos reservados.</p>
</footer>

<script src="games.js"></script>
<script>
    initHeader();
    // Mostrar mensaje si viene de logout o registro
    const params = new URLSearchParams(location.search);
    if (params.get('logout'))     showAlert('info',    'Sesión cerrada correctamente.');
    if (params.get('registered')) showAlert('success', 'Cuenta creada. Ya podés iniciar sesión.');

    function showAlert(type, msg) {
        const el = document.getElementById('alert-' + type);
        el.textContent = msg;
        el.classList.add('show');
    }

    document.getElementById('login-form').addEventListener('submit', function(e) {
        e.preventDefault();

        const email    = document.getElementById('email');
        const password = document.getElementById('password');
        let valid = true;

        // Validaciones
        if (!email.value || !/\S+@\S+\.\S+/.test(email.value)) {
            email.classList.add('invalid');
            document.getElementById('email-error').classList.add('show');
            valid = false;
        } else {
            email.classList.remove('invalid');
            document.getElementById('email-error').classList.remove('show');
        }

        if (!password.value) {
            password.classList.add('invalid');
            document.getElementById('pass-error').classList.add('show');
            valid = false;
        } else {
            password.classList.remove('invalid');
            document.getElementById('pass-error').classList.remove('show');
        }

        if (!valid) return;

        // Verificar usuario en localStorage
        const users = JSON.parse(localStorage.getItem('steam_users') || '[]');
        const user  = users.find(u => u.email === email.value && u.password === password.value);

        if (user) {
            localStorage.setItem('steam_session', JSON.stringify(user));
            window.location.href = 'dashboard.html';
        } else {
            showAlert('error', 'Email o contraseña incorrectos.');
        }
    });
</script>

</body>
</html>
