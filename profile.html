<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Steam — Perfil</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <a class="logo" href="store.html">
    <svg viewBox="0 0 148 148" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="74" cy="74" r="74" fill="#1b2838"/><path d="M74 18C43.1 18 18 43.1 18 74c0 24.8 15.7 46 37.9 54l13.9-57.4c-1.2-2.3-1.9-4.9-1.9-7.6 0-9.4 7.6-17 17-17s17 7.6 17 17-7.6 17-17 17c-.5 0-1 0-1.5-.1L27.9 93.4C33.4 113.6 52.2 128 74 128c30.9 0 56-25.1 56-56S104.9 18 74 18z" fill="#c6d4df"/><circle cx="85" cy="63" r="10" fill="#1b2838"/></svg>
    STEAM
  </a>
  <nav>
    <a href="store.html">TIENDA</a>
    <a href="community.html">COMUNIDAD</a>
    <a href="dashboard.html">BIBLIOTECA</a>
    <a href="about.html">ACERCA DE</a>
    <a href="support.html">SOPORTE</a>
  </nav>
  <div class="header-right">
    <a href="wallet.html" class="wallet-link" id="wallet-balance">💰 $0.00</a>
    <a href="wishlist.html" class="wishlist-link">♡ <span id="wishlist-count" class="wishlist-count" style="display:none">0</span></a>
    <a href="cart.html" class="cart-icon">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.68 13.39a2 2 0 0 0 2 1.61h9.72a2 2 0 0 0 2-1.61L23 6H6"/></svg>
      <span id="cart-badge" class="cart-badge" style="display:none">0</span>
    </a>
    <div id="header-user-zone"></div>
  </div>
</header>

<div class="page-wrap" style="margin-top:20px" id="profile-content"></div>

<footer><p>&copy; 2024 Valve Corporation. Todos los derechos reservados.</p></footer>

<script src="games.js"></script>
<script>
  if (!Session.isLoggedIn()) window.location.href = 'index.html';
  initHeader();

  const session = Session.get();
  const COLORS = ['#1a6496','#4c7a1e','#8e44ad','#c0392b','#e67e22','#16a085'];
  let avatarColor = localStorage.getItem('steam_avatar_color') || COLORS[0];

  function getLevel() {
    const owned = JSON.parse(localStorage.getItem('steam_library') || '[]').length + GAMES.filter(g=>g.free).length;
    if (owned <= 3) return 1;
    if (owned <= 7) return 2;
    if (owned <= 12) return 3;
    if (owned <= 20) return 4;
    return 5;
  }

  function getLibraryGames() {
    const purchasedIds = JSON.parse(localStorage.getItem('steam_library') || '[]').map(i => i.id);
    const freeIds = GAMES.filter(g => g.free).map(g => g.id);
    return [...new Set([...freeIds, ...purchasedIds])].map(id => GAMES.find(g => g.id === id)).filter(Boolean);
  }

  function render() {
    const libraryGames = getLibraryGames();
    const wishlistCount = Wishlist.count();
    const walletBalance = Wallet.get();
    const level = getLevel();
    const initial = session.username.charAt(0).toUpperCase();
    const totalSpent = JSON.parse(localStorage.getItem('steam_transactions') || '[]')
      .filter(t => t.amount < 0)
      .reduce((s, t) => s + Math.abs(t.amount), 0);

    document.getElementById('profile-content').innerHTML = `
      <!-- PROFILE HERO -->
      <div class="profile-hero">
        <div class="profile-avatar-big" id="p-avatar" style="background:${avatarColor}">
          ${initial}
          <div class="avatar-colors" id="avatar-colors-edit" style="display:none">
            ${COLORS.map(c => `<div class="avatar-color ${c===avatarColor?'active':''}" style="background:${c}" onclick="changeColor('${c}')"></div>`).join('')}
          </div>
        </div>
        <div class="profile-info">
          <h2 id="p-username">${session.username}</h2>
          <p>${session.email}</p>
          <div style="display:flex;align-items:center;gap:10px;margin-top:6px">
            <div class="profile-level-badge">
              <div class="online-dot"></div>
              Nivel ${level} Steam
            </div>
            <span style="font-size:12px;color:var(--teal)">● En línea</span>
          </div>
        </div>
        <div style="margin-left:auto;display:flex;flex-direction:column;gap:8px">
          <button class="btn-blue" onclick="toggleEdit()" style="padding:9px 18px;font-size:13px">✎ Editar perfil</button>
          <button class="btn-logout" onclick="logout()" style="padding:9px 18px;font-size:12px">Cerrar sesión</button>
        </div>
      </div>

      <!-- STATS -->
      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-icon">🎮</div>
          <div class="stat-value">${libraryGames.length}</div>
          <div class="stat-label">Juegos en biblioteca</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">♥</div>
          <div class="stat-value">${wishlistCount}</div>
          <div class="stat-label">En wishlist</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">💰</div>
          <div class="stat-value">$${walletBalance.toFixed(0)}</div>
          <div class="stat-label">Saldo Steam</div>
        </div>
        <div class="stat-card">
          <div class="stat-icon">🏆</div>
          <div class="stat-value">${level * 12}</div>
          <div class="stat-label">Logros obtenidos</div>
        </div>
      </div>

      <!-- EDIT PANEL (hidden by default) -->
      <div id="edit-panel" style="display:none;background:var(--panel2);border:1px solid var(--border);border-radius:6px;padding:20px;margin-bottom:20px">
        <h3 style="font-size:14px;font-weight:700;margin-bottom:14px;text-transform:uppercase;letter-spacing:.8px;color:var(--text-dim)">Editar perfil</h3>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px">
          <div class="form-group" style="margin:0">
            <label>Nombre de usuario</label>
            <input type="text" class="form-input" id="edit-username" value="${session.username}">
          </div>
          <div class="form-group" style="margin:0">
            <label>Color de avatar</label>
            <div style="display:flex;gap:8px;margin-top:8px">
              ${COLORS.map(c => `<div class="avatar-color ${c===avatarColor?'active':''}" style="background:${c};width:28px;height:28px;border-radius:50%;cursor:pointer;border:2px solid ${c===avatarColor?'#fff':'transparent'}" onclick="changeColor('${c}')"></div>`).join('')}
            </div>
          </div>
        </div>
        <button class="btn-blue" onclick="saveProfile()" style="padding:10px 24px;font-size:13px">Guardar cambios</button>
        <button class="btn-logout" onclick="toggleEdit()" style="padding:10px 18px;font-size:12px;margin-left:10px">Cancelar</button>
      </div>

      <!-- LIBRARY PREVIEW -->
      <div class="profile-section">
        <div class="row-header" style="margin-bottom:14px">
          <h3 class="section-label" style="margin:0">Tu biblioteca (${libraryGames.length})</h3>
          <a href="dashboard.html" style="font-size:12px;color:var(--blue-light)">Ver todo →</a>
        </div>
        <div class="profile-game-grid">
          ${libraryGames.slice(0,8).map(g => `
            <div class="profile-game-card" onclick="window.location='game.html?id=${g.id}'">
              <img src="${g.image}" alt="${g.title}" onerror="this.style.background='#1e3a52'">
              <div class="profile-game-info">
                <div class="profile-game-title">${g.title}</div>
              </div>
            </div>`).join('')}
          ${libraryGames.length === 0 ? `<p style="color:var(--text-dim);font-size:13px">No tenés juegos aún. <a href="store.html" style="color:var(--blue-light)">Ir a la tienda</a></p>` : ''}
        </div>
      </div>

      <!-- WISHLIST PREVIEW -->
      <div class="profile-section">
        <div class="row-header" style="margin-bottom:14px">
          <h3 class="section-label" style="margin:0">Wishlist (${wishlistCount})</h3>
          <a href="wishlist.html" style="font-size:12px;color:var(--blue-light)">Ver todo →</a>
        </div>
        <div class="profile-game-grid">
          ${Wishlist.get().slice(0,4).map(id => {
            const g = GAMES.find(g=>g.id===id);
            return g ? `
              <div class="profile-game-card" onclick="window.location='game.html?id=${g.id}'">
                <img src="${g.image}" alt="${g.title}" onerror="this.style.background='#1e3a52'">
                <div class="profile-game-info"><div class="profile-game-title">${g.title}</div></div>
              </div>` : '';
          }).join('')}
          ${wishlistCount === 0 ? `<p style="color:var(--text-dim);font-size:13px">Tu wishlist está vacía. <a href="store.html" style="color:var(--blue-light)">Explorar tienda</a></p>` : ''}
        </div>
      </div>`;
  }

  function toggleEdit() {
    const panel = document.getElementById('edit-panel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  }

  function changeColor(color) {
    avatarColor = color;
    localStorage.setItem('steam_avatar_color', color);
    render();
    initHeader();
  }

  function saveProfile() {
    const newName = document.getElementById('edit-username').value.trim();
    if (!newName) { toast('Ingresá un nombre de usuario', 'error'); return; }
    const s = Session.get();
    s.username = newName;
    localStorage.setItem('steam_session', JSON.stringify(s));
    toast('Perfil actualizado', 'success');
    render();
    initHeader();
  }

  render();
</script>
</body>
</html>
